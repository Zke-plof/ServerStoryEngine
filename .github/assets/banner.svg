<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <rect width="800" height="200" fill="#1a1a2e"/>
  <rect x="0" y="0" width="800" height="200" fill="url(#bg)" opacity="0.3"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
  </defs>
  <text x="400" y="80" font-family="'Courier New', monospace" font-size="48" font-weight="bold" fill="url(#gold)" text-anchor="middle" letter-spacing="4">SERVER STORY ENGINE</text>
  <text x="400" y="120" font-family="Georgia, serif" font-size="18" fill="#888" text-anchor="middle" font-style="italic">Your server's memory. Written in stone.</text>
  <rect x="300" y="140" width="200" height="2" fill="#ffd700" opacity="0.5"/>
  <text x="400" y="170" font-family="'Courier New', monospace" font-size="12" fill="#555" text-anchor="middle">A Paper plugin that turns player actions into history</text>
</svg>
